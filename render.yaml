databases:
  - name: dutch-a2-db
    plan: free
    databaseName: dutch_a2
    user: dutch_a2_user

services:
  - type: web
    name: dutch-a2-blitz
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: dutch-a2-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
