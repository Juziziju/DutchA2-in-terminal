databases:
  - name: dutch-a2-db
    plan: free
    databaseName: dutch_a2
    user: dutch_a2_user

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: dutch-a2-blitz-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: dutch-a2-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false  # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false  # set to your Static Site URL after first deploy

  # ── Frontend (React static build) ─────────────────────────────────────────
  - type: web
    name: dutch-a2-blitz
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false  # set to your API service URL, e.g. https://dutch-a2-blitz-api.onrender.com
