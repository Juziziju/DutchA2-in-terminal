databases:
  - name: dutch-a2-db
    plan: free
    databaseName: dutch_a2
    user: dutch_a2_user

services:
  # ── Backend (FastAPI) — Starter plan $7/mo ─────────────────────────────────
  - type: web
    name: dutch-a2-blitz-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: dutch-a2-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

staticSites:
  # ── Frontend (React) — Free ────────────────────────────────────────────────
  - name: dutch-a2-blitz
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
